<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TSIC Definition Editor</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #1a1a1a; color: #e7e7e7; font-family: system-ui, sans-serif; }
      #tsic-boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 1rem;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(2px);
        z-index: 9999;
      }
      #tsic-boot .spin {
        width: 48px; height: 48px;
        border: 4px solid rgba(255, 255, 255, 0.18);
        border-top-color: rgba(255, 255, 255, 0.85);
        border-radius: 50%;
        animation: tsic-boot-spin 0.9s linear infinite;
      }
      #tsic-boot .label { color: rgba(255, 255, 255, 0.85); font-size: 0.95rem; }
      @keyframes tsic-boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="tsic-boot">
      <div class="spin"></div>
      <div class="label">Loading project…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Shown only when launched inside the TSIC game (?host=tsic). Returns the
         in-game CEF view to the Mods screen. No-op for normal web visitors. -->
    <a id="tsic-host-back" href="#" hidden
       style="position:fixed; left:14px; bottom:14px; z-index:2147483000;
              display:inline-flex; align-items:center; gap:6px;
              padding:9px 15px; border-radius:6px;
              background:#b41e1e; color:#fff; font:600 13px system-ui,sans-serif;
              text-decoration:none; box-shadow:0 2px 10px rgba(0,0,0,.45);">
      &#8592; Back to game
    </a>
    <script>
      (function () {
        try {
          if (new URLSearchParams(location.search).get('host') === 'tsic') {
            var a = document.getElementById('tsic-host-back');
            if (a) {
              a.href = 'http://tsic.local/screens/mods.html';
              a.hidden = false;
            }
          }
        } catch (e) {}
      })();
    </script>
  </body>
</html>
